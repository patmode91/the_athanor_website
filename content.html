<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to The Dragon's Athanor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            text-align: center;
        }
        .content-area {
            padding: 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #FF4500;
        }
        p {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="content-area">
        <h1>Welcome, Initiate!</h1>
        <p>You have successfully entered The Dragon's Athanor.</p>
        <p>This is where the true journey begins...</p>
        <p>More content will be revealed here soon.</p>
    </div>
</body>
</html>
