<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sanctum Sanctorum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sanctum-container">
        <div id="background-layer"></div>
        <div id="veil-layer" data-tilt data-tilt-perspective="2000" data-tilt-speed="400" data-tilt-max="10">
            <div id="shard-layer"></div>
        </div>
        <div id="password-container">
            <h1>Welcome to The Dragon's Athanor</h1>
            <p>Explore a world seen through a shattered, burning obsidian mirror.</p>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password">
            <button type="button" id="enter-button">Enter</button>
        </div>

        <div id="content-layer" class="content-layer-hidden">
            <h1>Welcome, Initiate!</h1>
            <p>You have successfully entered The Dragon's Athanor.</p>
            <p>This is where the true journey begins...</p>
            <p>More content will be revealed here soon.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
